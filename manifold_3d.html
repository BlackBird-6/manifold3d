<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Model Manifold Visualization (PCA 3D)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; touch-action: none; }
canvas { display: block; width: 100%; height: 100%; }

#tooltip {
  display: none; position: fixed; pointer-events: none;
  background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.12);
  border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #222;
  max-width: 260px; z-index: 100; backdrop-filter: blur(6px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
#tooltip .tt-name { font-weight: 600; margin-bottom: 2px; color: #111; }
#tooltip .tt-family { font-size: 11px; opacity: 0.6; }

#legend {
  position: fixed; top: 12px; right: 12px; z-index: 50;
  background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px; padding: 0; backdrop-filter: blur(8px);
  font-size: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden;
}
#legend-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; cursor: pointer; user-select: none;
}
#legend-toggle h3 { font-size: 13px; color: #111; font-weight: 600; margin: 0; }
#legend-toggle .arrow { font-size: 10px; color: #888; transition: transform 0.2s; }
#legend.open #legend-toggle .arrow { transform: rotate(180deg); }
#legend-items {
  display: none; padding: 0 14px 10px; max-height: 45vh; overflow-y: auto;
}
#legend.open #legend-items { display: block; }
.legend-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer; user-select: none; }
.legend-item.hidden { opacity: 0.3; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-dot.diamond { border-radius: 0; transform: rotate(45deg); width: 9px; height: 9px; }
.legend-label { white-space: nowrap; }

#title-bar {
  position: fixed; top: 12px; left: 12px; z-index: 50;
  background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px; padding: 10px 14px; backdrop-filter: blur(8px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
#title-bar h1 { font-size: 15px; font-weight: 700; color: #111; }
#title-bar p { font-size: 11px; opacity: 0.5; margin-top: 2px; }

#axes-labels { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 50;
  font-size: 10px; opacity: 0.4; text-align: center; color: #555; }
</style>
</head>
<body>

<div id="title-bar">
  <h1>Model Manifold (PCA 3D)</h1>
  <p>Drag to rotate / Pinch to zoom</p>
</div>

<div id="legend">
  <div id="legend-toggle"><h3>Legend</h3><span class="arrow">&#9660;</span></div>
  <div id="legend-items"></div>
</div>
<div id="tooltip"><div class="tt-name"></div><div class="tt-family"></div></div>
<div id="axes-labels">X: Latent Dim 1 &nbsp; Y: Latent Dim 2 &nbsp; Z: Latent Dim 3</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>

<script type="module">

// -- Data --

    {l:"Qwen/Qwen2.5-7B-Instruct",x:0.5958,y:0.1719,z:0.1776},

    {l:"01-ai/Yi-1.5-34B",x:-0.1485,y:0.1486,z:-0.0428},

  ]},
  { name:"falcon, training", color:"#FF6692", symbol:"circle", points:[
    {l:"tiiuae/falcon-7b",x:-0.2373,y:-0.2903,z:0.0539},

    {l:"tiiuae/Falcon3-7B-Base",x:-0.0579,y:0.0516,z:-0.0154},

  ]},
  { name:"deepseek, training", color:"#B6E880", symbol:"circle", points:[
    {l:"deepseek-ai/deepseek-llm-7b-base",x:-0.2015,y:-0.2427,z:0.0398},
  ]},
  { name:"gpt-j, training", color:"#FF97FF", symbol:"circle", points:[
    {l:"EleutherAI/gpt-j-6b",x:-0.1279,y:-0.3108,z:0.0947},
  ]},
  { name:"pythia, training", color:"#FECB52", symbol:"circle", points:[
    {l:"EleutherAI/pythia-12b",x:-0.1372,y:-0.3093,z:0.1003},
  ]},
  { name:"stablelm, training", color:"#636efa", symbol:"circle", points:[
    {l:"stabilityai/stablelm-2-12b",x:-0.3353,y:-0.0393,z:-0.0097},
  ]},
  { name:"dbrx, training", color:"#EF553B", symbol:"circle", points:[
    {l:"databricks/dbrx-base",x:-0.4380,y:0.1299,z:-0.0331},
  ]},
  { name:"zephyr, training", color:"#00cc96", symbol:"circle", points:[
    {l:"HuggingFaceH4/zephyr-7b-beta",x:0.0590,y:-0.3240,z:-0.0516},
  ]},
  { name:"olmo, training", color:"#ab63fa", symbol:"circle", points:[
    {l:"allenai/OLMo-7B-hf",x:-0.1260,y:-0.3384,z:0.0567},
  ]},
];

// -- Scale factor --
const S = 2.5;

// -- Scene setup --
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(1.8, 1.2, 1.8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0xf0f2f5);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.rotateSpeed = 0.6;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;
controls.minDistance = 0.5;
controls.maxDistance = 8;

// -- Lighting --
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

// -- Grid --
function createGrid() {
  const group = new THREE.Group();
  const gridMat = new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.06, transparent: true });
  const ext = 1.2 * S;
  const steps = 8;
  const axes = ['x','y','z'];

  for (let ai = 0; ai < 3; ai++) {
    for (let i = 0; i <= steps; i++) {
      const t = -ext + (2 * ext / steps) * i;
      for (let dir = 0; dir < 2; dir++) {
        const a = new THREE.Vector3(), b = new THREE.Vector3();
        const c1 = axes[ai], c2 = axes[(ai + 1 + dir) % 3], c3 = axes[(ai + 1 + (1 - dir)) % 3];
        a[c1] = t; a[c2] = -ext; a[c3] = -ext;
        b[c1] = t; b[c2] = ext;  b[c3] = -ext;
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([a, b]), gridMat));
      }
    }
  }
  return group;
}

function createAxes() {
  const group = new THREE.Group();
  const len = 1.3 * S;
  [[0xff4444,1,0,0],[0x44ff44,0,1,0],[0x4488ff,0,0,1]].forEach(([c,dx,dy,dz]) => {
    const pts = [new THREE.Vector3(-len*dx,-len*dy,-len*dz), new THREE.Vector3(len*dx,len*dy,len*dz)];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: c, opacity: 0.6, transparent: true })));
  });
  return group;
}

scene.add(createGrid());
scene.add(createAxes());

// -- Point meshes --
const sphereGeo = new THREE.SphereGeometry(0.035, 16, 12);
const diamondGeo = new THREE.OctahedronGeometry(0.05);
const allPointMeshes = [];
const traceGroups = new Map(); // traceName -> THREE.Group

traces.forEach(trace => {
  const group = new THREE.Group();
  traceGroups.set(trace.name, group);
  const color = new THREE.Color(trace.color);

  trace.points.forEach(p => {
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 0.6, roughness: 0.25, metalness: 0.05,
    });
    const geo = trace.symbol === 'diamond' ? diamondGeo : sphereGeo;
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(p.x * S, p.z * S, p.y * S);
    if (trace.symbol === 'diamond') mesh.scale.setScalar(1.4);
    group.add(mesh);
    allPointMeshes.push({ mesh, trace, point: p });
  });

  scene.add(group);
});

// -- Glow sprites --
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 64; glowCanvas.height = 64;
const gctx = glowCanvas.getContext('2d');
const grad = gctx.createRadialGradient(32,32,0,32,32,32);
grad.addColorStop(0, 'rgba(0,0,0,0.25)');
grad.addColorStop(0.4, 'rgba(0,0,0,0.08)');
grad.addColorStop(1, 'rgba(0,0,0,0)');
gctx.fillStyle = grad;
gctx.fillRect(0,0,64,64);
const glowTex = new THREE.CanvasTexture(glowCanvas);

traces.forEach(trace => {
  const group = traceGroups.get(trace.name);
  trace.points.forEach(p => {
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTex, color: new THREE.Color(trace.color), transparent: true, opacity: 0.4, depthWrite: false
    }));
    sprite.position.set(p.x * S, p.z * S, p.y * S);
    sprite.scale.setScalar(0.18);
    group.add(sprite);
  });
});

// -- Legend --
const legendEl = document.getElementById('legend');
const legendToggle = document.getElementById('legend-toggle');
const legendItems = document.getElementById('legend-items');

legendToggle.addEventListener('click', () => {
  legendEl.classList.toggle('open');
});

traces.forEach(trace => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  const dot = document.createElement('div');
  dot.className = 'legend-dot' + (trace.symbol === 'diamond' ? ' diamond' : '');
  dot.style.background = trace.color;
  const label = document.createElement('span');
  label.className = 'legend-label';
  label.textContent = trace.name;
  item.appendChild(dot);
  item.appendChild(label);
  item.addEventListener('click', (e) => {
    e.stopPropagation();
    const group = traceGroups.get(trace.name);
    group.visible = !group.visible;
    item.classList.toggle('hidden', !group.visible);
  });
  legendItems.appendChild(item);
});

// -- Raycaster for hover/tap --
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const ttName = tooltip.querySelector('.tt-name');
const ttFamily = tooltip.querySelector('.tt-family');
let hoveredMesh = null;

function doHit(clientX, clientY) {
  pointer.x = (clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = allPointMeshes.filter(pm => pm.mesh.parent && pm.mesh.parent.visible).map(pm => pm.mesh);
  return raycaster.intersectObjects(meshes);
}

function showTooltip(entry, clientX, clientY) {
  if (hoveredMesh && hoveredMesh !== entry.mesh) {
    hoveredMesh.material.emissiveIntensity = 0.6;
    hoveredMesh.scale.setScalar(hoveredMesh.userData.origScale || 1);
  }
  hoveredMesh = entry.mesh;
  hoveredMesh.userData.origScale = hoveredMesh.userData.origScale || hoveredMesh.scale.x;
  hoveredMesh.material.emissiveIntensity = 0.8;
  hoveredMesh.scale.setScalar(hoveredMesh.userData.origScale * 1.5);

  ttName.textContent = entry.point.l;
  ttFamily.textContent = entry.trace.name;
  tooltip.style.display = 'block';
  let tx = clientX + 14, ty = clientY - 40;
  if (tx + 260 > window.innerWidth) tx = clientX - 270;
  if (ty < 10) ty = clientY + 20;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

function hideTooltip() {
  if (hoveredMesh) {
    hoveredMesh.material.emissiveIntensity = 0.6;
    hoveredMesh.scale.setScalar(hoveredMesh.userData.origScale || 1);
    hoveredMesh = null;
  }
  tooltip.style.display = 'none';
}

renderer.domElement.addEventListener('pointermove', e => {
  const hits = doHit(e.clientX, e.clientY);
  if (hits.length > 0) {
    const entry = allPointMeshes.find(pm => pm.mesh === hits[0].object);
    if (entry) showTooltip(entry, e.clientX, e.clientY);
    else hideTooltip();
  } else hideTooltip();
});

// Tap support for mobile
let pointerStart = null;
renderer.domElement.addEventListener('pointerdown', e => { pointerStart = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('pointerup', e => {
  if (pointerStart && Math.abs(e.clientX - pointerStart.x) < 6 && Math.abs(e.clientY - pointerStart.y) < 6) {
    const hits = doHit(e.clientX, e.clientY);
    if (hits.length > 0) {
      const entry = allPointMeshes.find(pm => pm.mesh === hits[0].object);
      if (entry) showTooltip(entry, e.clientX, e.clientY);
    } else hideTooltip();
  }
  pointerStart = null;
});

// -- Resize --
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// -- Animate --
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
